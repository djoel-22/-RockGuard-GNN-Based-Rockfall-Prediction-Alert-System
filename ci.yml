name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install flake8 black

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=venv,.venv

      - name: Check formatting with black
        run: black --check --line-length 120 .

  import-check:
    name: Import & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies (no GPU/VTK for CI)
        run: |
          pip install numpy pandas scipy requests

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile core/alertsystem.py
          python -m py_compile core/toolbar.py
          python -m py_compile pages/nodeconnection.py
          python -m py_compile pages/circular_meter.py
          echo "All files passed syntax check"
